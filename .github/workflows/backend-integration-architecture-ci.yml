name: 🏗️ Backend Integration + Architecture

on:
  workflow_dispatch:
  pull_request:
    paths:
      - test/**
      - .github/workflows/backend-integration-architecture-ci.yml
  push:
    branches:
      - main
    paths:
      - test/**
      - .github/workflows/backend-integration-architecture-ci.yml

jobs:
  architecture-identity:
    name: 🧪 Architecture | Identity Service
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 01/06 ⬇️ Checkout parent repository
        uses: actions/checkout@v4

      - name: 02/06 🧰 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: 03/06 📚 Clone repositories (common + identity)
        run: |
          rm -rf common services
          mkdir -p services
          git clone --depth 1 https://github.com/rdpresser/tc-agro-common.git common
          git clone --depth 1 https://github.com/rdpresser/tc-agro-identity-service.git services/identity-service

      - name: 04/06 📦 Restore architecture tests
        run: dotnet restore services/identity-service/test/TC.Agro.Identity.Architecture.Tests/TC.Agro.Identity.Architecture.Tests.csproj

      - name: 05/06 🧪 Run architecture tests
        run: dotnet test services/identity-service/test/TC.Agro.Identity.Architecture.Tests/TC.Agro.Identity.Architecture.Tests.csproj --configuration Release --no-restore --logger "trx;LogFileName=identity-architecture.trx" -p:RunSettingsFilePath=

      - name: 06/06 📤 Upload identity architecture results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-identity-results
          path: |
            **/TestResults/identity-architecture.trx
            **/test-results/identity-architecture.trx

  architecture-farm:
    name: 🧪 Architecture | Farm Service
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 01/06 ⬇️ Checkout parent repository
        uses: actions/checkout@v4

      - name: 02/06 🧰 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: 03/06 📚 Clone repositories (common + farm)
        run: |
          rm -rf common services
          mkdir -p services
          git clone --depth 1 https://github.com/rdpresser/tc-agro-common.git common
          git clone --depth 1 https://github.com/rdpresser/tc-agro-farm-service.git services/farm-service

      - name: 04/06 📦 Restore architecture tests
        run: dotnet restore services/farm-service/test/TC.Agro.Farm.Architecture.Tests/TC.Agro.Farm.Architecture.Tests.csproj

      - name: 05/06 🧪 Run architecture tests
        run: dotnet test services/farm-service/test/TC.Agro.Farm.Architecture.Tests/TC.Agro.Farm.Architecture.Tests.csproj --configuration Release --no-restore --logger "trx;LogFileName=farm-architecture.trx" -p:RunSettingsFilePath=

      - name: 06/06 📤 Upload farm architecture results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-farm-results
          path: |
            **/TestResults/farm-architecture.trx
            **/test-results/farm-architecture.trx

  architecture-sensor-ingest:
    name: 🧪 Architecture | Sensor Ingest Service
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 01/06 ⬇️ Checkout parent repository
        uses: actions/checkout@v4

      - name: 02/06 🧰 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: 03/06 📚 Clone repositories (common + sensor-ingest)
        run: |
          rm -rf common services
          mkdir -p services
          git clone --depth 1 https://github.com/rdpresser/tc-agro-common.git common
          git clone --depth 1 https://github.com/rdpresser/tc-agro-sensor-ingest-service.git services/sensor-ingest-service

      - name: 04/06 📦 Restore architecture tests
        run: dotnet restore services/sensor-ingest-service/test/TC.Agro.SensorIngest.Architecture.Tests/TC.Agro.SensorIngest.Architecture.Tests.csproj

      - name: 05/06 🧪 Run architecture tests
        run: dotnet test services/sensor-ingest-service/test/TC.Agro.SensorIngest.Architecture.Tests/TC.Agro.SensorIngest.Architecture.Tests.csproj --configuration Release --no-restore --logger "trx;LogFileName=sensor-ingest-architecture.trx" -p:RunSettingsFilePath=

      - name: 06/06 📤 Upload sensor-ingest architecture results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-sensor-ingest-results
          path: |
            **/TestResults/sensor-ingest-architecture.trx
            **/test-results/sensor-ingest-architecture.trx

  architecture-analytics:
    name: 🧪 Architecture | Analytics Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 01/06 ⬇️ Checkout parent repository
        uses: actions/checkout@v4

      - name: 02/06 🧰 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: 03/06 📚 Clone repositories (common + analytics)
        run: |
          rm -rf common services
          mkdir -p services
          git clone --depth 1 https://github.com/rdpresser/tc-agro-common.git common
          git clone --depth 1 https://github.com/rdpresser/tc-agro-analytics-worker.git services/analytics-worker

      - name: 04/06 📦 Restore architecture tests
        run: dotnet restore services/analytics-worker/test/TC.Agro.Analytics.Architecture.Tests/TC.Agro.Analytics.Architecture.Tests.csproj

      - name: 05/06 🧪 Run architecture tests
        run: dotnet test services/analytics-worker/test/TC.Agro.Analytics.Architecture.Tests/TC.Agro.Analytics.Architecture.Tests.csproj --configuration Release --no-restore --logger "trx;LogFileName=analytics-architecture.trx" -p:RunSettingsFilePath=

      - name: 06/06 📤 Upload analytics architecture results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-analytics-results
          path: |
            **/TestResults/analytics-architecture.trx
            **/test-results/analytics-architecture.trx

  integration-identity-farm:
    name: 🔗 Integration | Identity -> Farm
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - architecture-identity
      - architecture-farm
      - architecture-sensor-ingest
      - architecture-analytics

    steps:
      - name: 01/08 ⬇️ Checkout parent repository
        uses: actions/checkout@v4

      - name: 02/08 🧰 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: 03/08 📚 Clone required repositories
        run: |
          rm -rf common services/identity-service services/farm-service services/sensor-ingest-service services/analytics-worker
          mkdir -p services
          git clone --depth 1 https://github.com/rdpresser/tc-agro-common.git common
          git clone --depth 1 https://github.com/rdpresser/tc-agro-identity-service.git services/identity-service
          git clone --depth 1 https://github.com/rdpresser/tc-agro-farm-service.git services/farm-service
          git clone --depth 1 https://github.com/rdpresser/tc-agro-sensor-ingest-service.git services/sensor-ingest-service
          git clone --depth 1 https://github.com/rdpresser/tc-agro-analytics-worker.git services/analytics-worker

      - name: 04/08 🐳 Docker info
        run: docker version

      - name: 05/08 📦 Restore integration tests
        run: dotnet restore test/TC.Agro.Integration.Tests/TC.Agro.Integration.Tests.csproj

      - name: 06/08 🔗 Run integration tests (Identity -> Farm)
        run: dotnet test test/TC.Agro.Integration.Tests/TC.Agro.Integration.Tests.csproj --configuration Release --no-restore --logger "trx;LogFileName=integration.trx" -p:RunSettingsFilePath=

      - name: 07/08 📤 Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-identity-farm-results
          path: |
            **/TestResults/integration.trx
            **/test-results/integration.trx

      - name: 08/08 ✅ Integration job completed
        run: echo "Integration tests stage completed."

  pipeline-summary:
    name: 📊 Pipeline Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - architecture-identity
      - architecture-farm
      - architecture-sensor-ingest
      - architecture-analytics
      - integration-identity-farm

    steps:
      - name: 01/01 Show pipeline job results
        run: |
          echo "architecture-identity: ${{ needs.architecture-identity.result }}"
          echo "architecture-farm: ${{ needs.architecture-farm.result }}"
          echo "architecture-sensor-ingest: ${{ needs.architecture-sensor-ingest.result }}"
          echo "architecture-analytics: ${{ needs.architecture-analytics.result }}"
          echo "integration-identity-farm: ${{ needs.integration-identity-farm.result }}"