apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: farm-service
  namespace: agro-apps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: farm-service
  minReplicas: 4
  maxReplicas: 8
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 3
        periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 420
      policies:
      - type: Percent
        value: 30
        periodSeconds: 60
      selectPolicy: Min
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 55
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
